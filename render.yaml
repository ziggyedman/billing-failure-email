services:
  - type: web
    name: billing-failure-email
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: APP_URL
        sync: false
      - key: REPO_URL
        sync: false
